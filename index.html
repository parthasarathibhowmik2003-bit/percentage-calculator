<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual Calculator Suite | Percentage & Standard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            color: #e2e8f0;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .custom-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.2);
            transition: all 0.3s ease;
            font-family: 'JetBrains Mono', monospace;
        }
        .custom-input:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.2);
            outline: none;
        }

        .op-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .op-btn.active {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border-color: transparent;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .calc-btn {
            background: rgba(51, 65, 85, 0.8);
            border: 1px solid rgba(148, 163, 184, 0.1);
            transition: all 0.1s;
        }
        .calc-btn:active {
            transform: scale(0.95);
            background: rgba(71, 85, 105, 0.9);
        }
        .calc-btn.operator {
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
            border-color: rgba(99, 102, 241, 0.3);
        }
        .calc-btn.operator:active {
            background: rgba(99, 102, 241, 0.4);
        }
        .calc-btn.equals {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            border: none;
        }
        .calc-btn.equals:active {
            filter: brightness(1.1);
        }

        .history-item {
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .result-highlight {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Main Container -->
    <main class="w-full max-w-6xl glass-panel rounded-3xl p-6 md:p-8 shadow-2xl">
        
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-300 via-purple-300 to-pink-300 mb-2">
                Dual Calculator Suite
            </h1>
            <p class="text-slate-400 text-sm">
                Advanced Percentage Engine & Standard Calculator
            </p>
        </header>

        <!-- Two Column Layout -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <!-- LEFT SIDE: Percentage Calculator -->
            <div class="glass-panel rounded-2xl p-6 border border-indigo-500/20 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
                
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-white flex items-center gap-2">
                        <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                        Percentage Calculator
                    </h2>
                    <button onclick="clearPercentage()" class="text-xs text-slate-400 hover:text-white transition-colors">Clear All</button>
                </div>

                <!-- Display Area -->
                <div class="bg-slate-900/80 rounded-xl p-4 mb-6 border border-slate-700">
                    <div class="text-xs text-slate-500 mb-1">Current Calculation</div>
                    <div id="percentDisplay" class="text-2xl font-bold text-white font-mono break-all">0</div>
                    <div id="percentFormula" class="text-xs text-indigo-400 mt-1 font-mono h-4"></div>
                </div>

                <!-- Inputs -->
                <div class="space-y-4 mb-6">
                    <div>
                        <label class="block text-xs font-medium text-indigo-300 uppercase tracking-wider mb-1">Base Value</label>
                        <input type="number" id="baseValue" placeholder="Enter base number" 
                            class="custom-input w-full px-4 py-3 rounded-lg text-lg text-white"
                            onkeydown="if(event.key==='Enter')calculatePercentage()">
                    </div>

                    <!-- Operation Buttons -->
                    <div class="grid grid-cols-4 gap-2">
                        <button onclick="setPercentOp('add')" id="p-btn-add" class="op-btn active glass-panel rounded-lg py-2 text-lg font-bold text-slate-300 border border-slate-700">+</button>
                        <button onclick="setPercentOp('subtract')" id="p-btn-subtract" class="op-btn glass-panel rounded-lg py-2 text-lg font-bold text-slate-300 border border-slate-700">−</button>
                        <button onclick="setPercentOp('multiply')" id="p-btn-multiply" class="op-btn glass-panel rounded-lg py-2 text-lg font-bold text-slate-300 border border-slate-700">×</button>
                        <button onclick="setPercentOp('divide')" id="p-btn-divide" class="op-btn glass-panel rounded-lg py-2 text-lg font-bold text-slate-300 border border-slate-700">÷</button>
                    </div>

                    <div>
                        <label class="block text-xs font-medium text-pink-300 uppercase tracking-wider mb-1">Percentage (%)</label>
                        <input type="number" id="percentValue" placeholder="Enter percentage" 
                            class="custom-input w-full px-4 py-3 rounded-lg text-lg text-white"
                            onkeydown="if(event.key==='Enter')calculatePercentage()">
                    </div>
                </div>

                <!-- Calculate Button -->
                <button onclick="calculatePercentage()" 
                    class="w-full py-4 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold text-lg shadow-lg shadow-indigo-500/25 transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                    Calculate & Chain
                </button>

                <!-- Chain History -->
                <div class="mt-6 pt-4 border-t border-slate-700">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-xs font-medium text-slate-400 uppercase">Calculation Chain</h3>
                        <button onclick="resetChain()" class="text-xs text-rose-400 hover:text-rose-300">Reset Chain</button>
                    </div>
                    <div id="chainList" class="space-y-2 max-h-40 overflow-y-auto pr-1">
                        <div class="text-center text-slate-600 text-sm py-4 italic" id="emptyChain">Start calculating to build a chain</div>
                    </div>
                    <div id="chainTotal" class="mt-3 pt-3 border-t border-slate-700 hidden">
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-slate-400">Running Total:</span>
                            <span id="runningTotal" class="text-xl font-bold text-emerald-400 font-mono">0</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT SIDE: Standard Calculator -->
            <div class="glass-panel rounded-2xl p-6 border border-slate-700 flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-white flex items-center gap-2">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                        Standard Calculator
                    </h2>
                </div>

                <!-- Calculator Display -->
                <div class="bg-slate-900/80 rounded-xl p-4 mb-4 border border-slate-700 text-right">
                    <div id="calcPrevious" class="text-slate-500 text-sm h-6 font-mono"></div>
                    <div id="calcDisplay" class="text-3xl font-bold text-white font-mono overflow-x-auto whitespace-nowrap">0</div>
                </div>

                <!-- Calculator Keypad -->
                <div class="grid grid-cols-4 gap-3 flex-grow">
                    <button onclick="clearCalc()" class="calc-btn rounded-lg py-4 text-rose-400 font-bold col-span-2">AC</button>
                    <button onclick="deleteLast()" class="calc-btn rounded-lg py-4 text-slate-300 font-bold">DEL</button>
                    <button onclick="appendOperator('/')" class="calc-btn operator rounded-lg py-4 text-xl">÷</button>

                    <button onclick="appendNumber('7')" class="calc-btn rounded-lg py-4 text-white text-xl">7</button>
                    <button onclick="appendNumber('8')" class="calc-btn rounded-lg py-4 text-white text-xl">8</button>
                    <button onclick="appendNumber('9')" class="calc-btn rounded-lg py-4 text-white text-xl">9</button>
                    <button onclick="appendOperator('*')" class="calc-btn operator rounded-lg py-4 text-xl">×</button>

                    <button onclick="appendNumber('4')" class="calc-btn rounded-lg py-4 text-white text-xl">4</button>
                    <button onclick="appendNumber('5')" class="calc-btn rounded-lg py-4 text-white text-xl">5</button>
                    <button onclick="appendNumber('6')" class="calc-btn rounded-lg py-4 text-white text-xl">6</button>
                    <button onclick="appendOperator('-')" class="calc-btn operator rounded-lg py-4 text-xl">−</button>

                    <button onclick="appendNumber('1')" class="calc-btn rounded-lg py-4 text-white text-xl">1</button>
                    <button onclick="appendNumber('2')" class="calc-btn rounded-lg py-4 text-white text-xl">2</button>
                    <button onclick="appendNumber('3')" class="calc-btn rounded-lg py-4 text-white text-xl">3</button>
                    <button onclick="appendOperator('+')" class="calc-btn operator rounded-lg py-4 text-xl">+</button>

                    <button onclick="appendNumber('0')" class="calc-btn rounded-lg py-4 text-white text-xl col-span-2">0</button>
                    <button onclick="appendNumber('.')" class="calc-btn rounded-lg py-4 text-white text-xl">.</button>
                    <button onclick="calculate()" class="calc-btn equals rounded-lg py-4 text-xl shadow-lg shadow-purple-500/30">=</button>
                </div>

                <!-- Memory/History for Standard Calc -->
                <div class="mt-4 pt-4 border-t border-slate-700">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="text-xs font-medium text-slate-400 uppercase">Recent Results</h3>
                        <button onclick="clearCalcHistory()" class="text-xs text-slate-500 hover:text-white">Clear</button>
                    </div>
                    <div id="calcHistory" class="space-y-1 max-h-24 overflow-y-auto text-right">
                        <div class="text-slate-600 text-xs italic">No calculations yet</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ==================== PERCENTAGE CALCULATOR LOGIC ====================
        
        let percentOperation = 'add';
        let chain = [];
        let runningTotal = 0;

        const percentOps = {
            add: { symbol: '+', color: 'text-emerald-400', bg: 'bg-emerald-500' },
            subtract: { symbol: '-', color: 'text-rose-400', bg: 'bg-rose-500' },
            multiply: { symbol: '×', color: 'text-amber-400', bg: 'bg-amber-500' },
            divide: { symbol: '÷', color: 'text-cyan-400', bg: 'bg-cyan-500' }
        };

        function setPercentOp(op) {
            percentOperation = op;
            document.querySelectorAll('[id^="p-btn-"]').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`p-btn-${op}`).classList.add('active');
            updatePercentDisplay();
        }

        function formatNum(num) {
            if (Number.isInteger(num)) return num.toString();
            return parseFloat(num.toFixed(4)).toString();
        }

        function calculatePercentage() {
            const baseInput = document.getElementById('baseValue');
            const percentInput = document.getElementById('percentValue');
            
            const base = parseFloat(baseInput.value);
            const percent = parseFloat(percentInput.value);

            if (isNaN(base) || isNaN(percent)) {
                alert('Please enter valid numbers');
                return;
            }

            let result = 0;
            let percentValue = 0;

            switch(percentOperation) {
                case 'add':
                    percentValue = base * (percent / 100);
                    result = base + percentValue;
                    break;
                case 'subtract':
                    percentValue = base * (percent / 100);
                    result = base - percentValue;
                    break;
                case 'multiply':
                    percentValue = percent / 100;
                    result = base * percentValue;
                    break;
                case 'divide':
                    if (percent === 0) {
                        alert('Cannot divide by zero');
                        return;
                    }
                    percentValue = percent / 100;
                    result = base / percentValue;
                    break;
            }

            // Add to chain
            const chainItem = {
                base: base,
                percent: percent,
                op: percentOperation,
                result: result,
                percentValue: percentValue
            };

            chain.push(chainItem);
            
            // Update running total (simple sum of all results in chain)
            runningTotal = chain.reduce((sum, item) => sum + item.result, 0);
            
            // Update UI
            renderChain();
            
            // Set result as new base for next calculation (chaining feature)
            baseInput.value = formatNum(result);
            percentInput.value = '';
            percentInput.focus();
            
            updatePercentDisplay();
        }

        function renderChain() {
            const list = document.getElementById('chainList');
            const totalDiv = document.getElementById('chainTotal');
            const runningTotalEl = document.getElementById('runningTotal');
            
            if (chain.length === 0) {
                list.innerHTML = '<div class="text-center text-slate-600 text-sm py-4 italic" id="emptyChain">Start calculating to build a chain</div>';
                totalDiv.classList.add('hidden');
                return;
            }

            list.innerHTML = chain.map((item, index) => `
                <div class="history-item flex justify-between items-center bg-slate-800/50 p-3 rounded-lg border border-slate-700/50">
                    <div class="text-sm">
                        <span class="text-slate-400">${index + 1}.</span>
                        <span class="text-white font-mono">${formatNum(item.base)}</span>
                        <span class="${percentOps[item.op].color} font-bold">${percentOps[item.op].symbol}</span>
                        <span class="text-indigo-400 font-mono">${item.percent}%</span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-slate-500 text-xs">=</span>
                        <span class="text-emerald-400 font-bold font-mono">${formatNum(item.result)}</span>
                        <button onclick="removeFromChain(${index})" class="text-rose-500 hover:text-rose-400 text-xs ml-2">×</button>
                    </div>
                </div>
            `).join('');

            totalDiv.classList.remove('hidden');
            runningTotalEl.textContent = formatNum(runningTotal);
        }

        function removeFromChain(index) {
            chain.splice(index, 1);
            runningTotal = chain.reduce((sum, item) => sum + item.result, 0);
            renderChain();
        }

        function resetChain() {
            chain = [];
            runningTotal = 0;
            document.getElementById('baseValue').value = '';
            document.getElementById('percentValue').value = '';
            renderChain();
            updatePercentDisplay();
        }

        function clearPercentage() {
            resetChain();
        }

        function updatePercentDisplay() {
            const base = document.getElementById('baseValue').value || '0';
            const percent = document.getElementById('percentValue').value || '0';
            const display = document.getElementById('percentDisplay');
            const formula = document.getElementById('percentFormula');
            
            display.textContent = `${base} ${percentOps[percentOperation].symbol} ${percent}%`;
            formula.textContent = 'Press Calculate to execute';
        }

        // ==================== STANDARD CALCULATOR LOGIC ====================
        
        let calcDisplay = '0';
        let calcPrevious = '';
        let calcOperation = null;
        let calcResetNext = false;
        let calcHistory = [];

        function updateCalcDisplay() {
            document.getElementById('calcDisplay').textContent = calcDisplay;
            document.getElementById('calcPrevious').textContent = calcPrevious;
        }

        function appendNumber(num) {
            if (calcResetNext) {
                calcDisplay = num;
                calcResetNext = false;
            } else {
                calcDisplay = calcDisplay === '0' ? num : calcDisplay + num;
            }
            updateCalcDisplay();
        }

        function appendOperator(op) {
            if (calcOperation !== null && !calcResetNext) {
                calculate();
            }
            calcPrevious = calcDisplay + ' ' + op;
            calcOperation = op;
            calcResetNext = true;
            updateCalcDisplay();
        }

        function calculate() {
            if (calcOperation === null || calcResetNext) return;
            
            const prev = parseFloat(calcPrevious);
            const current = parseFloat(calcDisplay);
            let result = 0;

            switch(calcOperation) {
                case '+': result = prev + current; break;
                case '-': result = prev - current; break;
                case '*': result = prev * current; break;
                case '/': 
                    if (current === 0) {
                        alert('Cannot divide by zero');
                        return;
                    }
                    result = prev / current; 
                    break;
            }

            // Add to history
            calcHistory.unshift(`${prev} ${calcOperation} ${current} = ${result}`);
            if (calcHistory.length > 5) calcHistory.pop();
            renderCalcHistory();

            calcDisplay = formatNum(result);
            calcPrevious = '';
            calcOperation = null;
            calcResetNext = true;
            updateCalcDisplay();
        }

        function clearCalc() {
            calcDisplay = '0';
            calcPrevious = '';
            calcOperation = null;
            calcResetNext = false;
            updateCalcDisplay();
        }

        function deleteLast() {
            if (calcDisplay.length > 1) {
                calcDisplay = calcDisplay.slice(0, -1);
            } else {
                calcDisplay = '0';
            }
            updateCalcDisplay();
        }

        function renderCalcHistory() {
            const historyDiv = document.getElementById('calcHistory');
            if (calcHistory.length === 0) {
                historyDiv.innerHTML = '<div class="text-slate-600 text-xs italic">No calculations yet</div>';
                return;
            }
            historyDiv.innerHTML = calcHistory.map(item => 
                `<div class="text-slate-400 text-xs font-mono py-1 border-b border-slate-800/50">${item}</div>`
            ).join('');
        }

        function clearCalcHistory() {
            calcHistory = [];
            renderCalcHistory();
        }

        // Keyboard support for standard calculator
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return; // Don't interfere with percentage inputs
            
            const key = e.key;
            if (/[0-9]/.test(key)) appendNumber(key);
            if (key === '.') appendNumber('.');
            if (key === '+' || key === '-' || key === '*' || key === '/') appendOperator(key);
            if (key === 'Enter' || key === '=') calculate();
            if (key === 'Escape') clearCalc();
            if (key === 'Backspace') deleteLast();
        });

        // Initialize
        updatePercentDisplay();
        updateCalcDisplay();
    </script>
</body>
</html>
